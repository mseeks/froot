name: Determinism

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: determinism-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  determinism:
    name: temporal determinism (workflow boundary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Stdlib-only AST check — no install needed. Flags known-nondeterministic
      # calls written lexically inside an @workflow.defn class. High precision by
      # design (lexical scope only); transitive analysis is a later advisory ring.
      - run: python scripts/check_determinism.py src
