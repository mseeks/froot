name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    name: gate (format · lint · types · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync (dev + runtime extras, matching `make sync`)
        run: uv sync --extra dev --extra ai --extra github --extra otel --extra sandbox
      - run: uv run ruff format --check src tests
      - run: uv run ruff check src tests
      - run: uv run mypy
      - run: uv run pytest

  image:
    name: build · push image → ghcr.io
    needs: gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mseeks/froot:latest
            ghcr.io/mseeks/froot:${{ github.sha }}
